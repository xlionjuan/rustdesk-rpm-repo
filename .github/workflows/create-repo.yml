name: Create Repo for RustDesk latest and nightly

on:
  schedule:
    # Every 3AM UTC
    - cron: "0 3 * * *"
  pull_request:
    branches:
      - 'main'
    paths-ignore:
      - '**.md'
  push:
    branches:
      - 'main'
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: Verify container
    runs-on: ubuntu-24.04-arm
    steps:
        - name: Install Cosign
          uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

        - name: Verify
          run: |
            set -euo pipefail
            cosign verify --rekor-url=https://rekor.sigstore.dev \
            --certificate-identity-regexp "https://github.com/xlionjuan/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ghcr.io/xlionjuan/fedora-createrepo-image:latest

  prepare:
    name: Prepare
    runs-on: ubuntu-24.04-arm
    needs: verify
    container: ghcr.io/xlionjuan/fedora-createrepo-image:latest
    steps:
        - name: Checkout code
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with:
            persist-credentials: false

        - name: Define workfolders for RustDesk
          run: |
            set -euo pipefail
            echo "WORKFOLDER_LATEST=$(mktemp -p /tmp -d xlion-repo.XXXXX)" >> "$GITHUB_ENV"
            echo "WORKFOLDER_NIGHTLY=$(mktemp -p /tmp -d xlion-repo.XXXXX)" >> "$GITHUB_ENV"

        - name: Bootstrap repo info for RustDesk latest
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_LATEST }}
          run: |
            set -euo pipefail
            xlion-repo-utils-gh --workfolder $WORKFOLDER --repo rustdesk/rustdesk

        - name: Bootstrap repo info for RustDesk nightly
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_NIGHTLY }}
          run: |
            set -euo pipefail
            xlion-repo-utils-gh --workfolder $WORKFOLDER --repo rustdesk/rustdesk --tag nightly

        - name: Download RustDesk latest RPMs
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_LATEST }}
          run: |
            set -euo pipefail
            cd $WORKFOLDER
            cat dl_urls.txt | grep -E '\.rpm$' | wget2 --input-file=-
            xlion-repo-utils-gh --verify --workfolder $WORKFOLDER

        - name: Download RustDesk nightly RPMs
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_NIGHTLY }}
          run: |
            set -euo pipefail
            cd $WORKFOLDER
            cat dl_urls.txt | grep -E '\.rpm$' | wget2 --input-file=-
            xlion-repo-utils-gh --verify --workfolder $WORKFOLDER

        - name: Organize RustDesk packages to folders
          env:
            WORKFOLDER_LATEST: ${{ env.WORKFOLDER_LATEST }}
            WORKFOLDER_NIGHTLY: ${{ env.WORKFOLDER_NIGHTLY }}
          run: |
            set -euo pipefail
            mkdir -p wwwroot/latest/ori wwwroot/latest-suse/ori
            mkdir -p wwwroot/nightly/ori wwwroot/nightly-suse/ori
            # Latest (non-SUSE)
            cp $WORKFOLDER_LATEST/*-suse*.rpm wwwroot/latest-suse/ori/ 2>/dev/null || true
            cp $WORKFOLDER_LATEST/*.rpm wwwroot/latest/ori/ 2>/dev/null || true
            # Remove SUSE from non-SUSE folder
            rm -f wwwroot/latest/ori/*-suse*.rpm 2>/dev/null || true
            # Nightly (non-SUSE)
            cp $WORKFOLDER_NIGHTLY/*-suse*.rpm wwwroot/nightly-suse/ori/ 2>/dev/null || true
            cp $WORKFOLDER_NIGHTLY/*.rpm wwwroot/nightly/ori/ 2>/dev/null || true
            # Remove SUSE from non-SUSE folder
            rm -f wwwroot/nightly/ori/*-suse*.rpm 2>/dev/null || true

        - name: Sleep 1s
          run: sleep 1

        - name: Reversion nightly version number with date and recompress
          run: |
            set -euo pipefail
            pids=()
            xlion-repo-repackage-rpm --source-dir wwwroot/nightly/ori --date-version --remove-source-dir & pids+=("$!")
            xlion-repo-repackage-rpm --source-dir wwwroot/nightly-suse/ori --date-version --remove-source-dir & pids+=("$!")
            xlion-repo-repackage-rpm --source-dir wwwroot/latest/ori --remove-source-dir & pids+=("$!")
            xlion-repo-repackage-rpm --source-dir wwwroot/latest-suse/ori --remove-source-dir & pids+=("$!")
            for pid in "${pids[@]}"; do
              wait "$pid"
            done
            echo "Run tree"
            tree

        - name: Output summary
          run: |
            set -euo pipefail
            echo "## Download Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tree wwwroot >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

        - name: Sleep 1s
          run: sleep 1

        - name: Publish unsigned artifacts
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          with:
            name: unsigned
            path: wwwroot
            if-no-files-found: error

  sign:
    name: Sign RPMs and repos
    runs-on: ubuntu-24.04-arm
    needs: prepare
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    container: ghcr.io/xlionjuan/fedora-createrepo-image:latest
    steps:
        - name: Download unsigned artifacts
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
          with:
            pattern: unsigned
            path: wwwroot
            merge-multiple: true

        - name: Prepare rpm macros
          run: |
            set -euo pipefail
            umask 077
            echo "RPMMACROS=$(mktemp)" >> "$GITHUB_ENV"

        - name: Import GPG Key
          run: |
            set -euo pipefail
            xlion-repo-gpg-import \
              --key-env GPG_PRIVATE_KEY \
              --create-gnupghome \
              --github-env \
              --name GPG_FINGERPRINT \
              --rpmkeys-import
          env:
            GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

        - name: Define the lists of folder
          run: |
            set -euo pipefail
            printf '%s\n' \
              'REPO_DIRS_JSON<<JSON' \
              '[' \
              '  "wwwroot/latest",' \
              '  "wwwroot/latest-suse",' \
              '  "wwwroot/nightly",' \
              '  "wwwroot/nightly-suse"' \
              ']' \
              'JSON' >> "$GITHUB_ENV"

        - name: Sign RPMs
          run: |
            set -euo pipefail
            # Folder list
            mapfile -t REPO_DIRS < <(jq -r '.[]' <<< "$REPO_DIRS_JSON")
            repo_args=()
            for d in "${REPO_DIRS[@]}"; do
              repo_args+=(--dir "$d")
            done
            xlion-repo-rpm-sign-packages "${repo_args[@]}" --gpg-key "$GPG_FINGERPRINT"

        - name: Sleep 1s
          run: sleep 1

        - name: Create repo
          run: |
            set -euo pipefail
            # Folder list
            mapfile -t REPO_DIRS < <(jq -r '.[]' <<< "$REPO_DIRS_JSON")
            repo_args=()
            for d in "${REPO_DIRS[@]}"; do
              repo_args+=(--dir "$d")
            done
            xlion-repo-rpm-createrepo "${repo_args[@]}"

        - name: Sleep 0.5s
          run: sleep 0.5

        - name: Sign repo
          run: |
            set -euo pipefail
            # Folder list
            mapfile -t REPO_DIRS < <(jq -r '.[]' <<< "$REPO_DIRS_JSON")
            repo_args=()
            for d in "${REPO_DIRS[@]}"; do
              repo_args+=(--dir "$d")
            done
            xlion-repo-rpm-sign-repomd "${repo_args[@]}" --gpg-key "$GPG_FINGERPRINT"

        - name: Sleep 0.5s
          run: sleep 0.5

        - name: Clean up
          if: always()
          run: |
            set -euo pipefail
            rm -rf "$GNUPGHOME" || true
            rm -rf "$RPMMACROS" || true

        - name: Output final folder structure
          run: |
            set -euo pipefail
            echo "## Final Published Folder Structure" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tree wwwroot >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

        - name: Upload Pages artifact
          uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
          with:
            name: github-pages
            path: wwwroot

        - name: Publish Artifacts
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          with:
            name: cf_r2
            path: wwwroot
            if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    needs: sign
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write # Pages need this too
    steps:
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  push-to-cf-r2:
    name: Push to Cloudflare R2
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    needs: sign
    steps:
        - name: Download artifact
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
          with:
            pattern: cf_r2
            path: wwwroot
            merge-multiple: true

        - name: Upload to Cloudflare R2
          uses: ryand56/r2-upload-action@b801a390acbdeb034c5e684ff5e1361c06639e7c # v1.4
          with:
            r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
            r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
            r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
            r2-bucket: ${{ secrets.R2_BUCKET }}
            keep-file-fresh: true
            source-dir: wwwroot
            destination-dir: ./
