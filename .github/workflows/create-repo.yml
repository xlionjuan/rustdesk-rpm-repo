name: Create Repo for RustDesk latest and nightly

on:
  schedule:
    # Every 3AM UTC
    - cron: "0 3 * * *"
  pull_request:
    branches:
      - 'main'
    paths-ignore:
      - '**.md'
  push:
    branches:
      - 'main'
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: Verify container
    runs-on: ubuntu-24.04-arm
    steps:
        - name: Install Cosign
          uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

        - name: Verify
          run: |
            set -euo pipefail
            cosign verify --rekor-url=https://rekor.sigstore.dev \
            --certificate-identity-regexp "https://github.com/xlionjuan/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ghcr.io/xlionjuan/fedora-createrepo-image:latest

  prepare:
    name: Prepare
    runs-on: ubuntu-24.04-arm
    needs: verify
    container: ghcr.io/xlionjuan/fedora-createrepo-image:latest
    steps:
        - name: Checkout code
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with:
            persist-credentials: false

        - name: Define workfolders for RustDesk
          run: |
            set -euo pipefail
            echo "WORKFOLDER_LATEST=$(mktemp -p /tmp -d xlion-repo.XXXXX)" >> "$GITHUB_ENV"
            echo "WORKFOLDER_NIGHTLY=$(mktemp -p /tmp -d xlion-repo.XXXXX)" >> "$GITHUB_ENV"

        - name: Bootstrap repo info for RustDesk latest
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_LATEST }}
          run: |
            set -euo pipefail
            xlion-repo-utils-gh --workfolder $WORKFOLDER --repo rustdesk/rustdesk

        - name: Bootstrap repo info for RustDesk nightly
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_NIGHTLY }}
          run: |
            set -euo pipefail
            xlion-repo-utils-gh --workfolder $WORKFOLDER --repo rustdesk/rustdesk --tag nightly

        - name: Download RustDesk latest RPMs
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_LATEST }}
          run: |
            set -euo pipefail
            cd $WORKFOLDER
            cat dl_urls.txt | grep -E '\.rpm$' | wget2 --input-file=-
            xlion-repo-utils-gh --verify --workfolder $WORKFOLDER

        - name: Download RustDesk nightly RPMs
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_NIGHTLY }}
          run: |
            set -euo pipefail
            cd $WORKFOLDER
            cat dl_urls.txt | grep -E '\.rpm$' | wget2 --input-file=-
            xlion-repo-utils-gh --verify --workfolder $WORKFOLDER

        - name: Organize RustDesk packages to folders
          env:
            WORKFOLDER_LATEST: ${{ env.WORKFOLDER_LATEST }}
            WORKFOLDER_NIGHTLY: ${{ env.WORKFOLDER_NIGHTLY }}
          run: |
            set -euo pipefail
            mkdir -p wwwroot/latest/ori wwwroot/latest-suse/ori
            mkdir -p wwwroot/nightly/ori wwwroot/nightly-suse/ori
            # Latest (non-SUSE)
            cp $WORKFOLDER_LATEST/*-suse*.rpm wwwroot/latest-suse/ori/ 2>/dev/null || true
            cp $WORKFOLDER_LATEST/*.rpm wwwroot/latest/ori/ 2>/dev/null || true
            # Remove SUSE from non-SUSE folder
            rm -f wwwroot/latest/ori/*-suse*.rpm 2>/dev/null || true
            # Nightly (non-SUSE)
            cp $WORKFOLDER_NIGHTLY/*-suse*.rpm wwwroot/nightly-suse/ori/ 2>/dev/null || true
            cp $WORKFOLDER_NIGHTLY/*.rpm wwwroot/nightly/ori/ 2>/dev/null || true
            # Remove SUSE from non-SUSE folder
            rm -f wwwroot/nightly/ori/*-suse*.rpm 2>/dev/null || true

        - name: Sleep 1s
          run: sleep 1

        - name: Reversion nightly version number with date and recompress
          run: |
            set -euo pipefail
            bash rustdesk_nightly_reversion.sh wwwroot/nightly/ori IS_NIGHTLY &\
            bash rustdesk_nightly_reversion.sh wwwroot/nightly-suse/ori IS_NIGHTLY &\
            bash rustdesk_nightly_reversion.sh wwwroot/latest/ori "" &\
            bash rustdesk_nightly_reversion.sh wwwroot/latest-suse/ori ""
            echo "Run tree"
            tree

        - name: Output summary
          run: |
            set -euo pipefail
            echo "## Download Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tree wwwroot >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

        - name: Sleep 1s
          run: sleep 1

        - name: Publish unsigned artifacts
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          with:
            name: unsigned
            path: wwwroot
            if-no-files-found: error

  sign:
    name: Sign RPMs and repos
    runs-on: ubuntu-24.04-arm
    needs: prepare
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    container: ghcr.io/xlionjuan/fedora-createrepo-image:latest
    steps:
        - name: Download unsigned artifacts
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
          with:
            pattern: unsigned
            path: wwwroot
            merge-multiple: true

        - name: Prepare ephemeral GPG home + rpm macros
          run: |
            set -euo pipefail
            umask 077
            echo "GNUPGHOME=$(mktemp -d)" >> "$GITHUB_ENV"
            echo "RPMMACROS=$(mktemp)" >> "$GITHUB_ENV"
            echo "GPG_TTY=" >> "$GITHUB_ENV"

        - name: Import GPG Key
          run: |
            set -euo pipefail
            umask 077

            IMPORT_FPR="$(
              printf '%s' "$GPG_PRIVATE_KEY" |
              gpg --batch --yes --status-fd=1 --import 2>/dev/null |
              sed 's/\[GNUPG:\]/\n[GNUPG:]/g' |
              awk '/^\[GNUPG:\] IMPORT_OK/ {print $4; exit}'
            )"
            test -n "$IMPORT_FPR"
            
            echo "GPG_FINGERPRINT=$IMPORT_FPR" >> "$GITHUB_ENV"

            rpmkeys --import <(gpg --batch --armor --export "$IMPORT_FPR")
          env:
            GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

        - name: Define the lists of folder
          run: |
            set -euo pipefail
            printf '%s\n' \
              'REPO_DIRS_JSON<<JSON' \
              '[' \
              '  "wwwroot/latest",' \
              '  "wwwroot/latest-suse",' \
              '  "wwwroot/nightly",' \
              '  "wwwroot/nightly-suse"' \
              ']' \
              'JSON' >> "$GITHUB_ENV"

        - name: Sign RPMs
          run: |
            #!/bin/bash

            set -euo pipefail

            # Folder list
            mapfile -t REPO_DIRS < <(jq -r '.[]' <<< "$REPO_DIRS_JSON")

            MAX_RETRY=3
            RETRY_SLEEP=2

            # Return 0 = success
            has_signature() {
              echo "== rpmkeys output for $1 ==" >&2
              rpmkeys -Kv "$1" >&2
              echo "== end ==" >&2
              rpmkeys -Kv "$1" | grep -qi "$GPG_FINGERPRINT"
            }


            echo "Signing..."
            for d in "${REPO_DIRS[@]}"; do
              for f in "$d"/*.rpm; do
                echo "Signing: $f"
                rpmsign --key-id "$GPG_FINGERPRINT" --addsign "$f"
              done
            done
            echo ""

            echo "Validate..."

            for d in "${REPO_DIRS[@]}"; do
              for f in "$d"/*.rpm; do
                echo "Checking: $f"

                if has_signature "$f"; then
                  echo "  ✔ OK: $f"
                  continue
                fi

                echo "  ⚠ Signature missing or invalid, start retry: $f"

                attempt=1
                while (( attempt <= MAX_RETRY )); do
                  echo "  → Retry $attempt/$MAX_RETRY: $f"
                  # Ignore exit code for rpmsign
                  if ! rpmsign --addsign "$f"; then
                    echo "    (rpmsign --addsign returned non-zero, ignore and re-check)"
                  fi

                  if has_signature "$f"; then
                    echo "  ✔ OK after retry: $f"
                    break
                  fi

                  (( attempt++ ))
                  sleep "$RETRY_SLEEP"
                done

                # Failed completely when still not success
                if ! has_signature "$f"; then
                  echo "  ❌ Signature invalid or missing after ${MAX_RETRY} retries: $f"
                  exit 1
                fi
              done
            done

        - name: Sleep 1s
          run: sleep 1

        - name: Create repo
          run: |
            set -euo pipefail
            # Folder list
            mapfile -t REPO_DIRS < <(jq -r '.[]' <<< "$REPO_DIRS_JSON")

            for d in "${REPO_DIRS[@]}"; do
                echo "Running createrepo_c on: $d"
                createrepo_c "$d" &
            done
            wait

        - name: Sleep 0.5s
          run: sleep 0.5

        - name: Sign repo
          run: |
            set -euo pipefail
            # Folder list
            mapfile -t REPO_DIRS < <(jq -r '.[]' <<< "$REPO_DIRS_JSON")

            for d in "${REPO_DIRS[@]}"; do
                xml="$d/repodata/repomd.xml"
                echo "Signing metadata: $xml"
                gpg --detach-sign --armor "$xml" &
            done
            wait

        - name: Sleep 0.5s
          run: sleep 0.5

        - name: Clean up
          if: always()
          run: |
            set -euo pipefail
            rm -rf "$GNUPGHOME" || true
            rm -rf "$RPMMACROS" || true

        - name: Output final folder structure
          run: |
            set -euo pipefail
            echo "## Final Published Folder Structure" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tree wwwroot >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

        - name: Upload Pages artifact
          uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
          with:
            name: github-pages
            path: wwwroot

        - name: Publish Artifacts
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          with:
            name: cf_r2
            path: wwwroot
            if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    needs: sign
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write # Pages need this too
    steps:
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  push-to-cf-r2:
    name: Push to Cloudflare R2
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    needs: sign
    steps:
        - name: Download artifact
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
          with:
            pattern: cf_r2
            path: wwwroot
            merge-multiple: true

        - name: Upload to Cloudflare R2
          uses: ryand56/r2-upload-action@b801a390acbdeb034c5e684ff5e1361c06639e7c # v1.4
          with:
            r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
            r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
            r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
            r2-bucket: ${{ secrets.R2_BUCKET }}
            keep-file-fresh: true
            source-dir: wwwroot
            destination-dir: ./
